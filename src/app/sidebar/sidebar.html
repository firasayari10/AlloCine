<div class="sidebar-backdrop" 
     [class.open]="isOpen" 
     (click)="onBackdropClick($event)">
  
  <aside class="sidebar" [class.open]="isOpen">
    <div class="sidebar-header">
      <span class="sidebar-title">Menu</span>
      <button class="close-btn" (click)="closeSidebar()">
        ✕
      </button>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        @if (!item.requiresAuth || authService.isAuthenticated()) {
          <a class="nav-item"
             [routerLink]="item.route"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: item.exact}"
             (click)="closeSidebar()">
            <span class="nav-label">{{ item.label }}</span>
            <span class="nav-arrow">›</span>
          </a>
        }
      }
    </nav>

    @if (authService.isAuthenticated()) {
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">
        <h3 class="section-title">Account</h3>
        <nav class="sidebar-nav">
          <a class="nav-item" routerLink="/profile" routerLinkActive="active" (click)="closeSidebar()">
            <span class="nav-label">My Profile</span>
            <span class="nav-arrow">›</span>
          </a>
        </nav>
      </div>
    }

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <h3 class="section-title">Explore</h3>
      <nav class="sidebar-nav">
        <a class="nav-item" (click)="navigateToCategory('popular')">
          <span class="nav-label">Popular</span>
          <span class="nav-arrow">›</span>
        </a>
        <a class="nav-item" (click)="navigateToCategory('top_rated')">
          <span class="nav-label">Top Rated</span>
          <span class="nav-arrow">›</span>
        </a>
        <a class="nav-item" (click)="navigateToCategory('now_playing')">
          <span class="nav-label">Now Playing</span>
          <span class="nav-arrow">›</span>
        </a>
        <a class="nav-item" (click)="navigateToCategory('upcoming')">
          <span class="nav-label">Upcoming</span>
          <span class="nav-arrow">›</span>
        </a>
      </nav>
    </div>
  </aside>
</div>
