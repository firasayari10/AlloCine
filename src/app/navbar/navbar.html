<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-left">
      <button class="menu-btn" (click)="toggleMenu()" aria-label="Open menu">
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
      </button>

      <a class="navbar-brand" routerLink="/">
        <span class="logo-text">{{ title | titlecase }}</span>
      </a>
    </div>

    <div class="nav-links">
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        Home
      </a>
      <a class="nav-link" routerLink="/movies" routerLinkActive="active">
        Movies
      </a>
    </div>

    <div class="auth-section">
      @if (authService.isAuthenticated()) {
        <a class="user-avatar" routerLink="/profile" title="My Profile">
          {{ getInitials() }}
        </a>
        <button class="auth-btn logout" (click)="logout()">Logout</button>
      } @else {
        <a class="auth-btn login" routerLink="/login">Sign In</a>
        <a class="auth-btn register" routerLink="/register">Sign Up</a>
      }
    </div>
  </div>
</nav>
