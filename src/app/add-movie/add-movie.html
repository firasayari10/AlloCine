<section class="add-page fade-in">
  <a class="back-btn" routerLink="/">
    <span class="arrow">←</span>
    <span>{{ t.back }}</span>
  </a>

  <div class="page-container">
    <header class="page-header">
      <h1>{{ t.addNewMovie }}</h1>
      <p class="subtitle">{{ translationService.isEnglish() ? 'Add a new film to your collection' : 'Ajoutez un nouveau film à votre collection' }}</p>
    </header>

    <form class="form-container" (ngSubmit)="addMovie()">
      <div class="form-group">
        <label for="title">{{ t.movieTitle }}</label>
        <input 
          type="text" 
          id="title" 
          name="title" 
          [(ngModel)]="movie.title"
          [placeholder]="translationService.isEnglish() ? 'Enter movie title' : 'Entrez le titre du film'"
          required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="director">{{ t.movieDirector }}</label>
          <input 
            type="text" 
            id="director" 
            name="director" 
            [(ngModel)]="movie.director"
            [placeholder]="translationService.isEnglish() ? 'Enter director name' : 'Entrez le nom du réalisateur'">
        </div>

        <div class="form-group">
          <label for="releaseDate">{{ t.movieReleaseDate }}</label>
          <input 
            type="date" 
            id="releaseDate" 
            name="releaseDate" 
            [(ngModel)]="movie.releaseDate">
        </div>
      </div>

      <div class="form-group">
        <label for="synopsis">{{ t.movieSynopsis }}</label>
        <textarea 
          id="synopsis" 
          name="synopsis" 
          [(ngModel)]="movie.synopsis"
          [placeholder]="translationService.isEnglish() ? 'Enter movie synopsis' : 'Entrez le synopsis du film'"
          rows="5"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="rate">{{ t.movieRating }}</label>
          <input 
            type="number" 
            id="rate" 
            name="rate" 
            [(ngModel)]="movie.rate"
            min="0"
            max="10"
            step="0.1"
            placeholder="0-10">
        </div>

        <div class="form-group">
          <label for="image">{{ t.movieImage }}</label>
          <input 
            type="text" 
            id="image" 
            name="image" 
            [(ngModel)]="movie.image"
            [placeholder]="translationService.isEnglish() ? 'Enter image URL' : 'Entrez URL de image'">
        </div>
      </div>

      <div class="form-actions">
        <a class="btn-secondary" routerLink="/">
          {{ t.cancel }}
        </a>
        <button type="submit" class="btn-primary">
          {{ t.saveMovie }}
        </button>
      </div>
    </form>
  </div>
</section>
