<section class="auth-page fade-in">
  <div class="auth-container">
    <div class="auth-card">
      <header class="auth-header">
        <h1>Reset Password</h1>
        <p *ngIf="!isSubmitted">Enter your email to receive reset instructions</p>
      </header>

      <form class="auth-form" (ngSubmit)="submit()" *ngIf="!isSubmitted">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="email"
            placeholder="Enter your email"
            required>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading">
          {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>

      <div class="success-message" *ngIf="isSubmitted">
        <div class="success-icon">✓</div>
        <h2>Check your email</h2>
        <p>If an account exists for <strong>{{ email }}</strong>, you will receive password reset instructions.</p>
        <p class="note">(This is a demo - no actual email is sent)</p>
      </div>

      <div class="auth-footer">
        <p><a routerLink="/login">← Back to Sign In</a></p>
      </div>
    </div>
  </div>
</section>
