<section class="auth-page fade-in">
  <div class="auth-container">
    <div class="auth-card">
      <header class="auth-header">
        <h1>{{ t.signUp }}</h1>
        <p>{{ translationService.isEnglish() ? 'Join our movie community' : 'Rejoignez notre communauté cinéma' }}</p>
      </header>

      <form class="auth-form" (ngSubmit)="register()">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">{{ t.firstName }} *</label>
            <input 
              type="text" 
              id="firstName" 
              name="firstName" 
              [(ngModel)]="firstName"
              placeholder="John"
              required>
          </div>

          <div class="form-group">
            <label for="lastName">{{ t.lastName }}</label>
            <input 
              type="text" 
              id="lastName" 
              name="lastName" 
              [(ngModel)]="lastName"
              placeholder="Doe">
          </div>
        </div>

        <div class="form-group">
          <label for="email">{{ t.email }} *</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="email"
            placeholder="john@example.com"
            required>
        </div>

        <div class="form-group">
          <label for="password">{{ t.password }} *</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password"
            [placeholder]="translationService.isEnglish() ? 'At least 6 characters' : 'Au moins 6 caractères'"
            required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">{{ t.confirmPassword }} *</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            [(ngModel)]="confirmPassword"
            [placeholder]="translationService.isEnglish() ? 'Confirm your password' : 'Confirmez votre mot de passe'"
            required>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading">
          {{ isLoading ? t.loading : t.signUp }}
        </button>
      </form>

      <div class="auth-footer">
        <p>{{ t.alreadyHaveAccount }} <a routerLink="/login">{{ t.signIn }}</a></p>
      </div>
    </div>
  </div>
</section>
