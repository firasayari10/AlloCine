<section class="auth-page fade-in">
  <div class="auth-container">
    <div class="auth-card">
      <header class="auth-header">
        <h1>{{ t.signIn }}</h1>
        <p>{{ translationService.isEnglish() ? 'Sign in to your account' : 'Connectez-vous à votre compte' }}</p>
      </header>

      <form class="auth-form" (ngSubmit)="login()">
        <div class="form-group">
          <label for="email">{{ t.email }}</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="email"
            [placeholder]="translationService.isEnglish() ? 'Enter your email' : 'Entrez votre email'"
            required>
        </div>

        <div class="form-group">
          <label for="password">{{ t.password }}</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password"
            [placeholder]="translationService.isEnglish() ? 'Enter your password' : 'Entrez votre mot de passe'"
            required>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading">
          {{ isLoading ? t.loading : t.signIn }}
        </button>
      </form>

      <div class="auth-footer">
        <a routerLink="/forgot-password" class="forgot-link">{{ t.forgotPassword }}</a>
        <p>{{ t.dontHaveAccount }} <a routerLink="/register">{{ t.signUp }}</a></p>
      </div>
    </div>
  </div>
</section>
