<section class="update-page fade-in">
  <a class="back-btn" [routerLink]="['/movie', movie.id]">
    <span class="arrow">←</span>
    <span>Back to Movie</span>
  </a>

  <div class="page-container">
    <header class="page-header">
      <h1>Edit Movie</h1>
      <p class="subtitle">Update the details for this film</p>
    </header>

    <form class="form-container" (ngSubmit)="updateMovie()">
      <div class="form-group">
        <label for="title">Title</label>
        <input 
          type="text" 
          id="title" 
          name="title" 
          [(ngModel)]="movie.title"
          placeholder="Enter movie title"
          required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="director">Director</label>
          <input 
            type="text" 
            id="director" 
            name="director" 
            [(ngModel)]="movie.director"
            placeholder="Enter director name">
        </div>

        <div class="form-group">
          <label for="releaseDate">Release Date</label>
          <input 
            type="date" 
            id="releaseDate" 
            name="releaseDate" 
            [(ngModel)]="movie.releaseDate">
        </div>
      </div>

      <div class="form-group">
        <label for="synopsis">Synopsis</label>
        <textarea 
          id="synopsis" 
          name="synopsis" 
          [(ngModel)]="movie.synopsis"
          placeholder="Enter movie synopsis"
          rows="5"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="rate">Rating</label>
          <input 
            type="number" 
            id="rate" 
            name="rate" 
            [(ngModel)]="rateValue"
            min="0"
            max="10"
            step="0.1"
            placeholder="0-10">
        </div>

        <div class="form-group">
          <label for="image">Image URL</label>
          <input 
            type="text" 
            id="image" 
            name="image" 
            [(ngModel)]="movie.image"
            placeholder="Enter image URL">
        </div>
      </div>

      <div class="form-actions">
        <a class="btn-secondary" [routerLink]="['/movie', movie.id]">
          Cancel
        </a>
        <button type="submit" class="btn-primary">
          Save Changes
        </button>
      </div>
    </form>
  </div>
</section>
